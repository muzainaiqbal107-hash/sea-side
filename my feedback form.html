<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foam</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <span role="button" tabindex="0">
        <div class="main-container">
            <div class="contaner">

                <label for="name_label">
                    <h1>
                        <i>My feedback form</i>
                    </h1>

                </label>
            </div>
            <div class="foam-start">
                <div>
                    <label for="email_label">
                        <ul>
                            <li>
                                Name:<input type="text" name="text" id="name_label"></li>
                        </ul>
                        <ul>
                            <li>
                                Email: <input type="email" name="Email" id="email_label">
                            </li>
                        </ul>
                    </label>
                </div>
                <div>
                    <label for="password_label">
                        <ul>
                            <li>
                                Password: <input type="password" name="Password" id="password_label">
                            </li>
                        </ul>
                    </label>
                </div>
                <div>
                    <ul>
                        <li class="cheack-this">
                            Pleace check all the emotions that apply to you:
                        </li>
                    </ul>
                </div>
                <div>
                    <ul>
                        <li>
                            Sad<input type="checkbox">
                        </li>
                    </ul>
                    <ul>
                        <li>
                            Happy<input type="checkbox">
                        </li>
                    </ul>
                </div>
                <div>
                    <ul>
                        <li class="cheack-this">
                            How satisfied were you with our services?
                        </li>
                    </ul>

                    <ul>
                        <li>
                            Didn't care<input type="radio">
                        </li>
                    </ul>

                    <ul>
                        <li>
                            Very dissatisfied<input type="radio">
                        </li>
                    </ul>
                </div>
                <div>
                    <label for="Bio photo:">
                        <ul>
                            <li>
                                Bio photo:<input type="text">
                                <button class="button">Choose...</button>
                            </li>
                        </ul>
                    </label>
                </div>
                <div>
                    <label for="Select visited:">
                        <ul>
                            <li>
                                Location visited :<input type="text">
                                <form action="location">
                                    <select name="location" id="places">
                                        <option value="1"  id="value-1">karachi</option>
                                        <option value="2"  id="value-1">islamabad</option>
                                        <option value="3"  id="value-1">hydrabad</option>
                                        <option value="3"  id="value-1">lahore</option>
                                        <option value="3"  id="value-1">meerpoor khas</option>
                                    </select>
                                </form>
                            </li>
                        </ul>
                    </label>
                </div>
                <div>
                    <button class="Submit-btn">
                        ←Submit→
                    </button>
                </div>
            </div>
        </div>
    </span>

</body>

</html>
