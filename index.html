<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">
        <div class="inner-container">

            <div class="col-lg-6">

                        <br><br><br>

                        <br><br><br>

                        <br><br><br>

                            <option class="option" value="Author123">Author</option>
                            <option class="option" value="Reader123">Reader</option>
                            <option class="option" value="Editor">Editor</option>
                        </select>

                        <br><br>

                        <button class="submit-btn">
                            Register
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
